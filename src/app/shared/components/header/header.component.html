<nav class="navbar navbar-expand-lg navbar-light bg-light no-margin">
    <div class="container-fluid">
        <div class="navbar-header fixed-brand">
            <button type="button" (click)="toggleSidebar()" class="btn btn-dark me-3"> <i
                    class="bi bi-wrench-adjustable-circle"></i> Tools </button>
            <!-- <a class="navbar-brand" href="#">
                <i class="fa fa-rocket fa-2x"></i> M-33
            </a> -->
        </div>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <button class="btn btn-outline-secondary" (click)="toggleSidebarMini()">
                        <i class="bi bi-layout-sidebar-inset"></i>
                    </button>
                </li>
            </ul>
        </div>
        <a class="navbar-brand" routerLink="consultant/dashbord">Dashbord</a>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item dropdown">
                    <a class="nav-link active dropdown-toggle" href="#" id="navbarDropdown" role="button"
                        data-bs-toggle="dropdown" aria-expanded="false">
                        Entreprises
                    </a>
                    <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                        <li><a class="dropdown-item" href="#">Entreprise A</a></li>
                        <li><a class="dropdown-item" href="#">Entreprise B</a></li>
                        <li><a class="dropdown-item" href="#">Entreprise C</a></li>
                        <li><a class="dropdown-item" href="#">Entreprise D</a></li>

                    </ul>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page"
                        routerLink="consultant/documentation">Documentation</a>
                </li>

            </ul>
            <form class="d-flex">
                <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                <button class="btn btn-outline-dark" type="submit">Search</button>
            </form>
        </div>

    </div>
</nav>

<div id="wrapper" [ngClass]="{ 'toggled': isSidebarOpen, 'toggled-2': isSidebarMini }">
    <!-- Sidebar -->
    <div id="sidebar-wrapper">
        <ul class="sidebar-nav nav flex-column" id="menu">
            <li *ngFor="let item of menu" class="nav-item">
                <a role="button" class="nav-link" (click)="item.children.length ? toggleSubmenu(item) : null">
                    <i class="fa" [ngClass]="item.icon"></i> {{ item.label }}
                    <span *ngIf="item.children.length" class="float-end">
                        <i class="fa" [ngClass]="item.expanded ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
                    </span>
                </a>

                <ul class="submenu" [class.open]="item.expanded">
                    <li *ngFor="let child of item.children" class="nav-item">
                        <a [routerLink]="['/page', child]" class="nav-link">
                            <i class="fa" [ngClass]="child"></i> {{ child }}
                        </a>
                    </li>
                </ul>
            </li>
        </ul>
    </div>

    <!-- Page Content -->

</div>
