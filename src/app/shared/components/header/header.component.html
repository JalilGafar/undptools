<div id="wrapper" [ngClass]="{ 'toggled': isSidebarOpen, 'toggled-2': isSidebarMini }">
    <!-- Sidebar -->
    <div id="sidebar-wrapper">
        <ul class="sidebar-nav nav flex-column" id="menu">
            <li *ngFor="let item of menu" class="nav-item">
                <a role="button" class="nav-link" (click)="item.children.length ? toggleSubmenu(item) : null">
                    <i class="licon" [ngClass]="item.icon" width="32"></i> {{ item.label }}
                    <span *ngIf="item.children.length" class="float-end">
                        <i class="bi" [ngClass]="item.expanded ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
                    </span>
                </a>

                <ul class="submenu" [class.open]="item.expanded">
                    <li *ngFor="let child of item.children" class="nav-item" (click)="toggleSidebar()">
                        <a [routerLink]="['consultant/tool', child.route]" [queryParams]="{toolName: child.label}"
                            class="nav-link">
                            <i class="fa" [ngClass]="child"></i> {{ child.label }}
                        </a>
                    </li>
                </ul>
            </li>
        </ul>
    </div>
