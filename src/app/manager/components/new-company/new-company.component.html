<div class="container my-4">
    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="card-title mb-4 text-center">Fiche entreprise</h2>

            <form class="row g-3" [formGroup]="companyForm" (ngSubmit)="onSubmitForm()">

                <!-- Infos générales -->
                <h5 class="mt-3">Informations générales</h5>
                <div class="col-md-6">
                    <label for="name" class="form-label">Nom de l'entreprise</label>
                    <input id="name" class="form-control" type="text" formControlName="name">
                </div>
                <div class="col-md-6">
                    <label for="date_creation" class="form-label">Année de création</label>
                    <input id="date_creation" class="form-control" formControlName="date_creation" type="number"
                        min="1900" max="2026">
                </div>

                <div class="col-md-6">
                    <label for="produits" class="form-label">Produits vendus</label>
                    <textarea class="form-control" formControlName="produits" id="produits" rows="2"></textarea>
                </div>
                <div class="col-md-6">
                    <label for="services" class="form-label">Services proposés</label>
                    <textarea class="form-control" formControlName="services" id="services" rows="2"></textarea>
                </div>

                <div class="col-12">
                    <label for="description" class="form-label">Brève présentation</label>
                    <textarea class="form-control" formControlName="description" id="description" rows="3"></textarea>
                </div>

                <!-- Infos Gérant -->
                <h5 class="mt-4">Informations sur le gérant</h5>
                <div class="col-md-6">
                    <label for="gerant" class="form-label">Nom du gérant</label>
                    <input id="gerant" class="form-control" type="text" formControlName="gerant">
                </div>
                <div class="col-md-6">
                    <label for="nbr_employer" class="form-label">Nombre d'employés</label>
                    <input id="nbr_employer" class="form-control" type="number" formControlName="nbr_employer">
                </div>
                <div class="col-md-6">
                    <label for="nbr_femme" class="form-label">Nombre de femmes</label>
                    <input id="nbr_femme" class="form-control" type="number" formControlName="nbr_femme">
                </div>
                <div class="col-12">
                    <label for="descrt_gerant" class="form-label">À propos du gérant</label>
                    <textarea class="form-control" formControlName="descrt_gerant" id="descrt_gerant"
                        rows="3"></textarea>
                </div>

                <!-- Localisation -->
                <h5 class="mt-4">Localisation de l'entreprise</h5>
                <div class="col-md-4">
                    <label for="region" class="form-label">Région</label>
                    <input id="region" class="form-control" type="text" formControlName="region">
                </div>
                <div class="col-md-4">
                    <label for="departement" class="form-label">Département</label>
                    <input id="departement" class="form-control" type="text" formControlName="departement">
                </div>
                <div class="col-md-4">
                    <label for="ville" class="form-label">Ville</label>
                    <input id="ville" class="form-control" type="text" formControlName="ville">
                </div>
                <div class="col-md-4">
                    <label for="commune" class="form-label">Commune</label>
                    <input id="commune" class="form-control" type="text" formControlName="commune">
                </div>
                <div class="col-md-4">
                    <label for="quartier" class="form-label">Quartier</label>
                    <input id="quartier" class="form-control" type="text" formControlName="quartier">
                </div>
                <div class="col-md-4">
                    <label for="lieu" class="form-label">Lieu</label>
                    <input id="lieu" class="form-control" type="text" formControlName="lieu">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Consultant responsable</label>
                    <div class="card flex justify-center">
                        @if (user$|async; as user) {
                        <p-select [options]="user" formControlName="idUser" [checkmark]="true" optionLabel="username"
                            optionValue="id" [showClear]="true" placeholder="Select a User" class="w-full md:w-56" />
                        @if (isInvalid('idUser')) {
                        <p-message severity="error" size="small" variant="simple">User is required.</p-message>
                        }
                        }
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Coordonnées GPS</label>

                    @if (geoAvailable) {
                    <p-button
                        icon="pi pi-map-marker"
                        label="Utiliser ma position actuelle"
                        severity="secondary"
                        size="small"
                        styleClass="w-100 mb-2"
                        [loading]="isLocating"
                        (onClick)="captureLocation()" />
                    }

                    <input id="x" class="form-control mb-1" type="number"
                        formControlName="x" placeholder="X — Longitude">
                    <input id="y" class="form-control" type="number"
                        formControlName="y" placeholder="Y — Latitude">
                </div>

                <!-- Boutons -->
                <p-toast />
                <p-confirmdialog />
                <div class="col-12 text-center mt-4">
                    <button type="submit" (click)="confirm1($event)" class="btn btn-success me-2"
                        [disabled]="companyForm.invalid">
                        <i class="bi bi-check-circle"></i> Enregistrer
                    </button>
                    <button type="button" class="btn btn-secondary" (click)="onGoBack()">
                        <i class="bi bi-x-circle"></i> Annuler
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
